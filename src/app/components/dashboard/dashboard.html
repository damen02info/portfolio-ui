<div class="dashboard-container">
  <h2>Panel de control (Test)</h2>
  <p>Test de estado reactivo y bloqueo de interfaz.</p>

  <button (click)="onLaunchDeployment()" [disabled]="isLocked()" class="btn-deploy">
    @if (isLocked()) {
      Procesando despliegue
    } @else {
      Lanzar prueba de despliegue
    }
  </button>

  @if (logs().length > 0) {
    <div class="terminal-container">
      <div class="terminal-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">live-deployment-logs.log</span>
      </div>
      <div class="terminal-body" appAutoScroll>
        @for (line of logs(); track $index) {
          <div class="log-line"><span class="log-prompt">></span> {{ line }}</div>
        }
      </div>
    </div>
  }
</div>
